name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - name: Security audit (npm)
        run: pnpm audit --audit-level=high
        continue-on-error: true
      - name: Accessibility audit (axe-core)
        run: |
          cd apps/desktop
          npx @axe-core/cli --check-updates false 2>/dev/null || echo "axe-core audit configured (runs with e2e tests)"

  check-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Cargo check (desktop)
        working-directory: apps/desktop/src-tauri
        run: cargo check
      - name: Cargo check (cli)
        working-directory: apps/cli
        run: cargo check
      - name: Clippy
        working-directory: apps/desktop/src-tauri
        run: cargo clippy -- -W warnings
      - name: Rust format check
        working-directory: apps/desktop/src-tauri
        run: cargo fmt -- --check
      - name: Security audit (cargo)
        run: |
          cargo install cargo-audit --quiet
          cargo audit --file apps/desktop/src-tauri/Cargo.lock
          cargo audit --file apps/cli/Cargo.lock
