name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  # ── Create GitHub Release ─────────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.tag.outputs.tag }}';
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `ApiArk ${tag}`,
              body: `## ApiArk ${tag}\n\nDownload the installer for your platform below.\n\n### Installation\n- **Windows**: Download \`.msi\` or \`.exe\` installer\n- **macOS**: Download \`.dmg\` (Apple Silicon) or \`.dmg\` (Intel)\n- **Linux**: Download \`.AppImage\`, \`.deb\`, or \`.rpm\`\n\n---\n*Full changelog: https://github.com/${{ github.repository }}/compare/...${tag}*`,
              draft: true,
              prerelease: tag.includes('-beta') || tag.includes('-rc') || tag.includes('-alpha'),
            });
            return data.id;

  # ── Build Desktop App (per-platform) ──────────────────────────────────
  build-desktop:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64

          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64

          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64

          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ matrix.label }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.label }}-cargo-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm -C apps/desktop exec tsc --noEmit

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}
          updaterJsonPreferNsis: true

      - name: Upload updater signatures
        if: always()
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const target = '${{ matrix.target }}';
            const bundleDir = `apps/desktop/src-tauri/target/${target}/release/bundle`;

            function findFiles(dir) {
              const results = [];
              if (!fs.existsSync(dir)) return results;
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) results.push(...findFiles(full));
                else results.push(full);
              }
              return results;
            }

            const allFiles = findFiles(bundleDir);
            console.log('All bundle files:', allFiles.map(f => path.basename(f)));

            // Determine arch suffix for macOS sig renaming
            const archSuffix = target.includes('aarch64') ? '_aarch64' : '_x64';

            const updaterFiles = allFiles.filter(f => {
              const name = path.basename(f);
              if (name.startsWith('api-ark')) return false;
              if (name.endsWith('.sig')) return true;
              if (name.endsWith('.AppImage.tar.gz')) return true;
              if (name.endsWith('.app.tar.gz')) return true;
              if (name.endsWith('.nsis.zip')) return true;
              if (name.endsWith('.msi.zip')) return true;
              return false;
            });

            console.log('Updater files to upload:', updaterFiles.map(f => path.basename(f)));

            for (const file of updaterFiles) {
              let name = path.basename(file);

              // Rename macOS sigs to match uploaded asset names
              // Build produces: ApiArk.app.tar.gz.sig
              // tauri-action uploads as: ApiArk_aarch64.app.tar.gz / ApiArk_x64.app.tar.gz
              if (name === 'ApiArk.app.tar.gz.sig') {
                name = `ApiArk${archSuffix}.app.tar.gz.sig`;
              } else if (name === 'ApiArk.app.tar.gz') {
                name = `ApiArk${archSuffix}.app.tar.gz`;
              }

              console.log(`Uploading: ${name}`);
              try {
                await github.rest.repos.uploadReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: ${{ needs.create-release.outputs.release_id }},
                  name: name,
                  data: fs.readFileSync(file),
                });
              } catch (e) {
                if (e.status === 422) console.log(`  Already exists, skipping`);
                else throw e;
              }
            }

  # ── Build CLI (per-platform) ──────────────────────────────────────────
  build-cli:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
            ext: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
            ext: ".exe"
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
            ext: ""
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64
            ext: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/cli/target
          key: cli-${{ matrix.label }}-${{ hashFiles('apps/cli/Cargo.lock') }}

      - name: Build CLI
        working-directory: apps/cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          src="apps/cli/target/${{ matrix.target }}/release/apiark${{ matrix.ext }}"
          dst="apiark-cli-${{ matrix.label }}${{ matrix.ext }}"
          cp "$src" "$dst"

      - name: Upload CLI to release
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const path = 'apiark-cli-${{ matrix.label }}${{ matrix.ext }}';
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              name: path,
              data: fs.readFileSync(path),
            });

  # ── Publish Release ───────────────────────────────────────────────────
  publish-release:
    needs: [create-release, build-desktop, build-cli]
    if: always() && needs.create-release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Generate updater latest.json and publish
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const releaseId = ${{ needs.create-release.outputs.release_id }};
            const tag = '${{ needs.create-release.outputs.tag }}';
            const version = tag.replace(/^v/, '');

            // Get all release assets
            const { data: assets } = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              per_page: 100,
            });

            const assetMap = {};
            for (const a of assets) {
              assetMap[a.name] = a.browser_download_url;
            }

            // Helper to find sig content from asset URL
            async function getSigContent(sigName) {
              const asset = assets.find(a => a.name === sigName);
              if (!asset) return null;
              const { data } = await github.request('GET ' + asset.url, {
                headers: { Accept: 'application/octet-stream' }
              });
              return Buffer.from(data).toString('utf-8').trim();
            }

            const platforms = {};

            // Log all assets for debugging
            console.log('All release assets:', assets.map(a => a.name));

            // Linux - AppImage.tar.gz
            const linuxTarGz = assets.find(a => a.name.endsWith('.AppImage.tar.gz'));
            const linuxSig = await getSigContent(linuxTarGz?.name + '.sig');
            if (linuxTarGz && linuxSig) {
              platforms['linux-x86_64'] = {
                signature: linuxSig,
                url: linuxTarGz.browser_download_url,
              };
            } else {
              console.log(`Linux: bundle=${linuxTarGz?.name}, sig=${linuxSig ? 'found' : 'missing'}`);
            }

            // macOS ARM - app.tar.gz
            const macArmTarGz = assets.find(a => a.name.includes('aarch64') && a.name.endsWith('.app.tar.gz'));
            const macArmSig = await getSigContent(macArmTarGz?.name + '.sig');
            if (macArmTarGz && macArmSig) {
              platforms['darwin-aarch64'] = {
                signature: macArmSig,
                url: macArmTarGz.browser_download_url,
              };
            } else {
              console.log(`macOS ARM: bundle=${macArmTarGz?.name}, sig=${macArmSig ? 'found' : 'missing'}`);
            }

            // macOS x64 - app.tar.gz
            const macX64TarGz = assets.find(a => a.name.includes('x64') && a.name.endsWith('.app.tar.gz'));
            const macX64Sig = await getSigContent(macX64TarGz?.name + '.sig');
            if (macX64TarGz && macX64Sig) {
              platforms['darwin-x86_64'] = {
                signature: macX64Sig,
                url: macX64TarGz.browser_download_url,
              };
            } else {
              console.log(`macOS x64: bundle=${macX64TarGz?.name}, sig=${macX64Sig ? 'found' : 'missing'}`);
            }

            // Windows - NSIS .nsis.zip (preferred) or setup.exe
            const winNsis = assets.find(a => a.name.endsWith('.nsis.zip'));
            const winSetup = assets.find(a => a.name.endsWith('-setup.exe'));
            const winBundle = winNsis || winSetup;
            const winSig = await getSigContent(winBundle?.name + '.sig');
            if (winBundle && winSig) {
              platforms['windows-x86_64'] = {
                signature: winSig,
                url: winBundle.browser_download_url,
              };
            } else {
              console.log(`Windows: nsis=${winNsis?.name}, setup=${winSetup?.name}, sig=${winSig ? 'found' : 'missing'}`);
            }

            const latestJson = {
              version: `v${version}`,
              notes: `ApiArk v${version}`,
              pub_date: new Date().toISOString(),
              platforms,
            };

            console.log('latest.json platforms:', Object.keys(platforms));
            console.log('latest.json:', JSON.stringify(latestJson, null, 2));

            if (Object.keys(platforms).length === 0) {
              console.log('WARNING: No platforms found with signatures. Skipping latest.json upload.');
            } else {
              // Upload latest.json
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                name: 'latest.json',
                data: JSON.stringify(latestJson, null, 2),
              });
              console.log('latest.json uploaded successfully');
            }

            // Undraft the release
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              draft: false,
            });
